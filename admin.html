<style>
  :root {
    --background: 150 30% 5%;
    --foreground: 120 15% 96%;
    --card: 150 22% 8%;
    --primary: 142 68% 40%;
    --primary-foreground: 0 0% 100%;
    --muted: 150 16% 14%;
    --muted-foreground: 150 8% 62%;
    --accent: 112 65% 55%;
    --border: 150 18% 24%;
    --input: 150 16% 16%;
    --destructive: 0 84.2% 60.2%;
    --brand: 142 76% 46%;
    --brand-2: 100 72% 52%;
  }
  body {
    font-family: "Noto Sans Thai", sans-serif; color: hsl(var(--foreground));
    background:
      radial-gradient(ellipse 70% 55% at 15% -10%, hsl(var(--primary) / 0.30), transparent 60%),
      radial-gradient(ellipse 60% 50% at 90% 8%, hsl(var(--accent) / 0.22), transparent 60%),
      radial-gradient(ellipse 65% 55% at 50% 110%, hsl(var(--primary) / 0.18), transparent 60%),
      hsl(var(--background));
    background-attachment: fixed;
  }
  .font-display { font-family: "Noto Sans Thai", sans-serif; }
  .text-gradient {
    background: linear-gradient(100deg, hsl(var(--brand)) 0%, hsl(var(--brand-2)) 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .field-label { @apply text-xs font-medium text-muted-foreground mb-1.5 block; }
  .field-input {
    width: 100%; border-radius: 0.75rem; border: 1px solid hsl(var(--input));
    background: hsl(var(--background)); padding: 0.6rem 0.85rem; outline: none; font-size: 0.9rem;
    transition: border-color .18s ease, box-shadow .18s ease;
  }
  .field-input:hover { border-color: hsl(var(--primary)); box-shadow: 0 0 0 3px hsl(var(--primary) / .18), 0 0 22px 2px hsl(var(--primary) / .35); }
  .field-input:focus { border-color: hsl(var(--primary)); box-shadow: 0 0 0 3px hsl(var(--primary) / .3), 0 0 26px 2px hsl(var(--primary) / .4); }
  textarea.field-input { resize: vertical; min-height: 4.5rem; }

  .tab-btn { position: relative; z-index: 1; }
  .tab-btn:hover:not(.tab-btn-active) { color: hsl(var(--foreground)); }

  /* ===== Shared effect system (identical in index.html & admin.html) ===== */

  /* Menu active indicator — solid gradient pill behind the current menu item */
  .menu-active-indicator {
    position: absolute; top: 0; left: 0; opacity: 0; border-radius: 999px; pointer-events: none; z-index: 0;
    background: linear-gradient(120deg, hsl(var(--brand)) 0%, hsl(var(--brand-2)) 100%);
    box-shadow: 0 0 20px 2px hsl(var(--primary) / .3);
    transition: transform .38s cubic-bezier(.4,0,.2,1), width .38s cubic-bezier(.4,0,.2,1), height .38s cubic-bezier(.4,0,.2,1), opacity .25s ease;
  }

  /* Hover glide — glow with a visible colored edge that glides to the menu item under the cursor */
  .hover-glide {
    position: absolute; top: 0; left: 0; z-index: 0; opacity: 0; pointer-events: none; border-radius: 999px;
    background: hsl(var(--primary) / 0.18);
    border: 1px solid hsl(var(--primary) / 0.5);
    box-shadow: 0 0 18px 2px hsl(var(--primary) / 0.25);
    transition: transform .32s cubic-bezier(.4,0,.2,1), width .32s cubic-bezier(.4,0,.2,1), height .32s cubic-bezier(.4,0,.2,1), opacity .2s ease;
  }

  /* Pill buttons — soft glow only, no lift, no shine sweep */
  .tab-btn, #save-btn, #logout-btn,
  a.rounded-full, button.rounded-full, label.rounded-full {
    transition: box-shadow .25s ease, border-color .25s ease, color .2s ease;
  }
  #save-btn:hover, #logout-btn:hover,
  a.rounded-full:hover, button.rounded-full:hover, label.rounded-full:hover {
    box-shadow: 0 0 18px 2px hsl(var(--primary) / .3);
  }

  /* Small icon buttons — glow only, no lift */
  .icon-btn { transition: box-shadow .25s ease, border-color .25s ease, background-color .25s ease, color .2s ease; }
  .icon-btn:hover { box-shadow: 0 0 18px 2px hsl(var(--primary) / .3); }

  /* Glassmorphism cards — soft lift + glow on hover */
  .glass-card {
    background: hsl(var(--card) / 0.55);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid hsl(var(--border) / 1);
    transition: transform .35s cubic-bezier(.4,0,.2,1), box-shadow .35s ease, border-color .3s ease, background-color .3s ease;
  }
  .glass-card:hover {
    transform: translateY(-6px);
    border-color: hsl(var(--primary) / .55);
    box-shadow: 0 20px 45px -14px hsl(var(--primary) / .35), 0 0 26px 2px hsl(var(--primary) / .16);
  }

  /* Lift-only cards (e.g. image cards that keep their own visuals) — no bg override */
  .card-lift {
    transition: transform .35s cubic-bezier(.4,0,.2,1), box-shadow .35s ease, border-color .3s ease;
  }
  .card-lift:hover {
    transform: translateY(-6px);
    border-color: hsl(var(--primary) / .55);
    box-shadow: 0 20px 45px -14px hsl(var(--primary) / .35), 0 0 26px 2px hsl(var(--primary) / .16);
  }

  /* Ambient particle background — fixed, theme-colored, doesn't follow the mouse */
  #particle-bg { position: fixed; inset: 0; z-index: -1; pointer-events: none; }

  [data-theme] span:first-child { transition: box-shadow .25s ease; }
  [data-theme]:hover span:first-child { box-shadow: 0 0 20px 3px var(--swatch-glow, hsl(var(--primary) / .4)); }
</style>

<script>
/* ============ AMBIENT PARTICLE BACKGROUND (fixed, theme-colored, no mouse tracking) ============ */
(function () {
  const canvas = document.getElementById('particle-bg');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let particles = [];
  let w, h;
  let primaryHsl = '142 68% 40%';
  let accentHsl = '112 65% 55%';

  function readThemeColors() {
    const style = getComputedStyle(document.documentElement);
    primaryHsl = style.getPropertyValue('--primary').trim() || primaryHsl;
    accentHsl = style.getPropertyValue('--accent').trim() || accentHsl;
  }

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }

  function initParticles() {
    const count = Math.min(80, Math.max(28, Math.round((w * h) / 24000)));
    particles = Array.from({ length: count }, () => ({
      x: Math.random() * w,
      y: Math.random() * h,
      vx: (Math.random() - 0.5) * 0.12,
      vy: (Math.random() - 0.5) * 0.12,
      r: Math.random() * 1.3 + 0.6,
      accent: Math.random() < 0.22,
    }));
  }

  let frame = 0;
  function step() {
    frame++;
    if (frame % 20 === 0) readThemeColors(); // pick up live theme changes cheaply
    ctx.clearRect(0, 0, w, h);

    for (const p of particles) {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0 || p.x > w) p.vx *= -1;
      if (p.y < 0 || p.y > h) p.vy *= -1;
    }

    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const a = particles[i], b = particles[j];
        const dx = a.x - b.x, dy = a.y - b.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 130) {
          ctx.strokeStyle = `hsl(${primaryHsl} / ${(0.18 * (1 - dist / 130)).toFixed(3)})`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
      }
    }

    for (const p of particles) {
      ctx.beginPath();
      ctx.fillStyle = `hsl(${p.accent ? accentHsl : primaryHsl} / 0.7)`;
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }

    requestAnimationFrame(step);
  }

  readThemeColors();
  resize();
  initParticles();
  requestAnimationFrame(step);
  window.addEventListener('resize', () => { resize(); initParticles(); });
})();
</script>

  const binary = atob(INDEX_TEMPLATE_B64);

  return new TextDecoder('utf-8').decode(bytes);
}

function loadContent() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return deepMerge(cloneDefault(), JSON.parse(raw));
  } catch (e) { console.warn(e); }
  return cloneDefault();
}
function deepMerge(base, override) {
  if (Array.isArray(override)) return override;
  if (typeof override === 'object' && override !== null) {
    const out = { ...base };
    for (const k in override) out[k] = deepMerge(base?.[k], override[k]);
    return out;
  }
  return override === undefined ? base : override;
}

function buildTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = TABS.map(t => `
    <button data-tab="${t.id}" class="tab-btn inline-flex items-center gap-1.5 rounded-full px-4 py-2 text-sm font-medium border transition ${activeTab === t.id ? 'tab-btn-active text-primary-foreground border-transparent' : 'border-border text-muted-foreground hover:text-foreground'}">
      <i data-lucide="${t.icon}" class="h-3.5 w-3.5"></i> ${t.label}
    </button>`).join('');
  tabsEl.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => { activeTab = btn.dataset.tab; buildTabs(); renderTab(); if (window.lucide) lucide.createIcons(); });
    btn.addEventListener('mouseenter', () => moveTabHoverIndicator(btn));
  });
  const tabsWrap = document.getElementById('tabs-wrap');
  const hoverIndicator = document.getElementById('tab-hover-indicator');
  if (tabsWrap && hoverIndicator) {
    tabsWrap.addEventListener('mouseleave', () => { hoverIndicator.style.opacity = '0'; });
  }
  requestAnimationFrame(updateTabIndicator);
  renderTab();
}

function moveTabHoverIndicator(btn) {
  const wrap = document.getElementById('tabs-wrap');
  const indicator = document.getElementById('tab-hover-indicator');
  if (!wrap || !indicator || !btn) return;
  const wrapRect = wrap.getBoundingClientRect();
  const btnRect = btn.getBoundingClientRect();
  indicator.style.width = `${btnRect.width}px`;
  indicator.style.height = `${btnRect.height}px`;
  indicator.style.transform = `translate(${btnRect.left - wrapRect.left}px, ${btnRect.top - wrapRect.top}px)`;
  indicator.style.opacity = '1';
}

function updateTabIndicator() {
  const wrap = document.getElementById('tabs-wrap');
  const indicator = document.getElementById('tab-indicator');
  const activeBtn = document.querySelector(`.tab-btn[data-tab="${activeTab}"]`);
  if (!wrap || !indicator || !activeBtn) return;
  const wrapRect = wrap.getBoundingClientRect();
  const btnRect = activeBtn.getBoundingClientRect();
  indicator.style.opacity = '1';
  indicator.style.width = `${btnRect.width}px`;
  indicator.style.height = `${btnRect.height}px`;
  indicator.style.transform = `translate(${btnRect.left - wrapRect.left}px, ${btnRect.top - wrapRect.top}px)`;
}
window.addEventListener('resize', updateTabIndicator);

function buildSitemapXml(c) {
  const url = (c.seo?.siteUrl || 'https://example.com').replace(/\/+$/, '') + '/';
  const today = new Date().toISOString().slice(0, 10);
  return `<?xml version="1.0" encoding="UTF-8"?>
<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
  <url>
    <loc>${url}</loc>
    <lastmod>${today}</lastmod>
    <changefreq>weekly</changefreq>
    <priority>1.0</priority>
  </url>
</urlset>
`;
}

function buildRobotsTxt(c) {
  const url = (c.seo?.siteUrl || 'https://example.com').replace(/\/+$/, '');
  return `User-agent: *
Allow: /
Disallow: /admin.html

Sitemap: ${url}/sitemap.xml
`;
}

function downloadTextFile(filename, text, mime) {
  const blob = new Blob([text], { type: mime });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}


// Generic data-path binding: maps input/textarea values directly onto the content object.
function getPath(obj, path) {
  return path.split('.').reduce((o, k) => (o == null ? o : o[k.replace(/\[|\]/g, m => m)]), obj);
}
function setPath(obj, path, value) {
  const keys = path.split('.');
  let o = obj;
  for (let i = 0; i < keys.length - 1; i++) o = o[keys[i]];
  o[keys[keys.length - 1]] = value;
}

function bindInputs(container) {
  container.querySelectorAll('[data-path]').forEach(el => {
    el.addEventListener('input', () => {
      setPath(content, el.dataset.path, el.value);
    });
  });
  container.querySelectorAll('[data-path-checkbox]').forEach(el => {
    el.addEventListener('change', () => {
      setPath(content, el.dataset.pathCheckbox, el.checked);
    });
  });
}

function inputHtml(path, value, opts = {}) {
  const isTextarea = opts.textarea;
  const cls = `field-input ${opts.class || ''}`.trim();
  return isTextarea
    ? `<textarea class="${cls}" data-path="${path}" rows="${opts.rows || 3}">${escapeHtml(value)}</textarea>`
    : `<input class="${cls}" data-path="${path}" value="${escapeAttr(value)}" placeholder="${opts.placeholder || ''}">`;
}
function labeled(label, innerHtml, cls = '') {
  return `<div class="${cls}"><label class="field-label">${label}</label>${innerHtml}</div>`;
}
function card(innerHtml, extraClass = '') {
  return `<div class="glass-card rounded-2xl p-6 ${extraClass}">${innerHtml}</div>`;
}
function sectionTitle(t, desc) {
  return `<div class="mb-5"><h2 class="font-display text-xl font-bold">${t}</h2>${desc ? `<p class="text-sm text-muted-foreground mt-1">${desc}</p>` : ''}</div>`;
}

function renderTab() {
  const el = document.getElementById('tab-content');
  if (activeTab === 'general') el.innerHTML = renderGeneral();
  else if (activeTab === 'theme') el.innerHTML = renderTheme();
  else if (activeTab === 'services') el.innerHTML = renderServices();
  else if (activeTab === 'portfolio') el.innerHTML = renderPortfolio();
  else if (activeTab === 'experience') el.innerHTML = renderExperience();
  else if (activeTab === 'process') el.innerHTML = renderProcess();
  else if (activeTab === 'contact') el.innerHTML = renderContact();
  else if (activeTab === 'seo') el.innerHTML = renderSeo();
  else if (activeTab === 'settings') el.innerHTML = renderSettings();
  bindInputs(el);
  attachDynamicHandlers(el);
  if (window.lucide) lucide.createIcons();
}

/* ============ DYNAMIC LIST HANDLERS ============ */
function attachDynamicHandlers(container) {
  attachGeneralExtra(container);
  attachExperienceExtra(container);

  container.querySelectorAll('[data-theme]').forEach(btn => {
    btn.addEventListener('click', () => {
      content.theme = btn.dataset.theme;
      applyTheme(content.theme);
      renderTab();
      saveContent();
    });
  });

  container.querySelectorAll('[data-remove]').forEach(btn => {
    btn.addEventListener('click', () => {
      const path = btn.dataset.remove;
      const lastDot = path.lastIndexOf('.');
      const arrPath = path.slice(0, lastDot);
      const idx = parseInt(path.slice(lastDot + 1), 10);
      const arr = getPath(content, arrPath);
      arr.splice(idx, 1);
      renderTab();
      saveContent();
    });
  });

  const addNav = container.querySelector('#add-nav');
  if (addNav) addNav.addEventListener('click', () => {
    content.nav.push({ label: 'เมนูใหม่', href: '#section' });
    renderTab(); saveContent();
  });
  const addService = container.querySelector('#add-service');
  if (addService) addService.addEventListener('click', () => {
    content.services.push({ icon: 'sparkles', title: 'บริการใหม่', desc: 'คำอธิบายบริการ' });
    renderTab(); saveContent();
  });
  const addPortfolio = container.querySelector('#add-portfolio');
  if (addPortfolio) addPortfolio.addEventListener('click', () => {
    content.portfolio.push({ img: 'https://images.unsplash.com/photo-1492619375914-88005aa9e8fb?w=800', tag: PORTFOLIO_TAGS[0], title: 'ผลงานใหม่', orientation: 'vertical', link: '#' });
    renderTab(); saveContent();
  });
  const addExperience = container.querySelector('#add-experience');
  if (addExperience) addExperience.addEventListener('click', () => {
    content.experience.items.push({ dateRange: 'Month Year – Month Year', position: 'ตำแหน่งใหม่', company: 'ชื่อบริษัท', paragraphs: ['รายละเอียดงาน'] });
    renderTab(); saveContent();
  });
  const addSkillGroup = container.querySelector('#add-skill-group');
  if (addSkillGroup) addSkillGroup.addEventListener('click', () => {
    if (content.skills.groups.length >= 8) { alert('หน้าเว็บแสดงทักษะได้สูงสุด 8 หมวด (Grid 4 คอลัมน์ x 2 แถว) — กรุณาลบหมวดเก่าก่อนเพิ่มใหม่'); return; }
    content.skills.groups.push({ name: 'หมวดใหม่', tags: ['Tag'] });
    renderTab(); saveContent();
  });
  const addStep = container.querySelector('#add-step');
  if (addStep) addStep.addEventListener('click', () => {
    const n = String(content.steps.length + 1).padStart(2, '0');
    content.steps.push({ n, t: 'ขั้นตอนใหม่', d: 'คำอธิบายขั้นตอน' });
    renderTab(); saveContent();
  });
  const addBullet = container.querySelector('#add-bullet');
  if (addBullet) addBullet.addEventListener('click', () => {
    content.contact.bullets.push('จุดเด่นใหม่');
    renderTab(); saveContent();
  });
  const addSocial = container.querySelector('#add-social');
  if (addSocial) addSocial.addEventListener('click', () => {
    content.contact.socials.push({ icon: 'youtube', href: '#' });
    renderTab(); saveContent();
  });

  const savePass = container.querySelector('#save-pass');
  if (savePass) savePass.addEventListener('click', () => {
    const val = container.querySelector('#new-pass').value.trim();
    if (val.length < 4) { alert('รหัสผ่านต้องมีอย่างน้อย 4 ตัวอักษร'); return; }
    localStorage.setItem(AUTH_KEY, val);
    container.querySelector('#new-pass').value = '';
    alert('เปลี่ยนรหัสผ่านเรียบร้อย');
  });

  const exportIndexBtn = container.querySelector('#export-index');
  if (exportIndexBtn) exportIndexBtn.addEventListener('click', () => {
    const originalLabel = exportIndexBtn.innerHTML;
    exportIndexBtn.disabled = true;
    exportIndexBtn.innerHTML = '<i data-lucide="loader-2" class="h-3.5 w-3.5 animate-spin"></i> กำลังสร้างไฟล์...';
    try {
      const template = getIndexTemplate();

      const contentMarker = /const DEFAULT_CONTENT = \{[\s\S]*?\n\};/;
      if (!contentMarker.test(template)) throw new Error('ไม่พบตำแหน่ง DEFAULT_CONTENT ในเทมเพลตที่ฝังไว้ — โครงไฟล์อาจถูกแก้ไป');
      let baked = template.replace(contentMarker, `const DEFAULT_CONTENT = ${JSON.stringify(content, null, 2)};`);

      const seoMarker = /<!-- SEO:START -->[\s\S]*?<!-- SEO:END -->/;
      if (seoMarker.test(baked)) {
        baked = baked.replace(seoMarker, buildSeoHeadHtml(content));
      }

      const blob = new Blob([baked], { type: 'text/html' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'export/index.html';
      a.click();
      URL.revokeObjectURL(a.href);
    } catch (err) {
      alert('สร้างไฟล์ index.html ไม่สำเร็จ: ' + err.message);
    } finally {
      exportIndexBtn.disabled = false;
      exportIndexBtn.innerHTML = originalLabel;
      if (window.lucide) lucide.createIcons();
    }
  });

  const exportSitemapBtn = container.querySelector('#export-sitemap');
  if (exportSitemapBtn) exportSitemapBtn.addEventListener('click', () => {
    downloadTextFile('sitemap.xml', buildSitemapXml(content), 'application/xml');
  });
  const exportRobotsBtn = container.querySelector('#export-robots');
  if (exportRobotsBtn) exportRobotsBtn.addEventListener('click', () => {
    downloadTextFile('robots.txt', buildRobotsTxt(content), 'text/plain');
  });

  const exportBtn = container.querySelector('#export-json');
  if (exportBtn) exportBtn.addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(content, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'framecut-content.json';
    a.click();
  });
  const importInput = container.querySelector('#import-json');
  if (importInput) importInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        content = deepMerge(cloneDefault(), parsed);
        applyTheme(content.theme || 'green');
        saveContent();
        renderTab();
        alert('นำเข้าข้อมูลเรียบร้อย');
      } catch (err) { alert('ไฟล์ JSON ไม่ถูกต้อง'); }
    };
    reader.readAsText(file);
  });
  const resetBtn = container.querySelector('#reset-default');
  if (resetBtn) resetBtn.addEventListener('click', () => {
    if (confirm('ต้องการรีเซ็ตข้อมูลทั้งหมดกลับเป็นค่าเริ่มต้นหรือไม่?')) {
      content = cloneDefault();
      applyTheme(content.theme || 'green');
      saveContent();
      renderTab();
    }
  });
}

document.getElementById('save-btn').addEventListener('click', saveContent);
</script>

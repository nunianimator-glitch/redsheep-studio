<script>
/* ============ AMBIENT PARTICLE BACKGROUND (fixed, theme-colored, no mouse tracking) ============ */
(function () {
  const canvas = document.getElementById('particle-bg');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let particles = [];
  let w, h;
  let primaryHsl = '142 68% 40%';
  let accentHsl = '112 65% 55%';

  function readThemeColors() {
    const style = getComputedStyle(document.documentElement);
    primaryHsl = style.getPropertyValue('--primary').trim() || primaryHsl;
    accentHsl = style.getPropertyValue('--accent').trim() || accentHsl;
  }

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }

  function initParticles() {
    const count = Math.min(80, Math.max(28, Math.round((w * h) / 24000)));
    particles = Array.from({ length: count }, () => ({
      x: Math.random() * w,
      y: Math.random() * h,
      vx: (Math.random() - 0.5) * 0.12,
      vy: (Math.random() - 0.5) * 0.12,
      r: Math.random() * 1.3 + 0.6,
      accent: Math.random() < 0.22,
    }));
  }

  let frame = 0;
  function step() {
    frame++;
    if (frame % 20 === 0) readThemeColors(); // pick up live theme changes cheaply
    ctx.clearRect(0, 0, w, h);

    for (const p of particles) {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0 || p.x > w) p.vx *= -1;
      if (p.y < 0 || p.y > h) p.vy *= -1;
    }

    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const a = particles[i], b = particles[j];
        const dx = a.x - b.x, dy = a.y - b.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 130) {
          ctx.strokeStyle = `hsl(${primaryHsl} / ${(0.18 * (1 - dist / 130)).toFixed(3)})`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
      }
    }

    for (const p of particles) {
      ctx.beginPath();
      ctx.fillStyle = `hsl(${p.accent ? accentHsl : primaryHsl} / 0.7)`;
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }

    requestAnimationFrame(step);
  }

  readThemeColors();
  resize();
  initParticles();
  requestAnimationFrame(step);
  window.addEventListener('resize', () => { resize(); initParticles(); });
})();
</script>

function applyTheme(themeId) {
  const theme = THEMES[themeId] || THEMES.green;
  const root = document.documentElement;
  Object.entries(theme.vars).forEach(([k, v]) => root.style.setProperty(`--${k}`, v));
}

function loadContent() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) { console.warn('Could not load saved content, using defaults', e); }
  return DEFAULT_CONTENT;
}

  const url = (seo.siteUrl || '').replace(/\/+$/, '') + '/';

    </div>

    <!-- Services -->
    ${isSectionOn('services') ? `
    <section id="services" class="mx-auto max-w-[80rem] px-5 py-24">
      <div class="max-w-2xl">
        <p class="text-sm font-semibold uppercase tracking-widest text-accent">บริการของเรา</p>
        <h2 class="mt-3 font-display text-4xl sm:text-5xl font-bold tracking-tight">ครบทุกงานวิดีโอ ในที่เดียว</h2>
        <p class="mt-4 text-muted-foreground text-lg">ไม่ว่าจะคลิปสั้น คลิปยาว หรือโฆษณา เราดูแลให้ตั้งแต่ต้นจนจบ</p>
      </div>
      <div class="mt-14 grid gap-5 sm:grid-cols-2 lg:grid-cols-3">${servicesHtml}</div>
    </section>` : ''}

    <!-- Portfolio -->
    ${isSectionOn('work') ? `
    <section id="work" class="mx-auto max-w-[80rem] px-5 py-24">
      <div class="flex flex-wrap items-end justify-between gap-4">
        <div class="max-w-2xl">
          <p class="text-sm font-semibold uppercase tracking-widest text-accent">ผลงานที่ผ่านมา</p>
          <h2 class="mt-3 font-display text-4xl sm:text-5xl font-bold tracking-tight">ตัวอย่างงานที่เราภูมิใจ</h2>
        </div>
        <a href="#contact" class="inline-flex items-center gap-1.5 text-sm font-semibold text-accent hover:gap-2.5 transition-all">
          อยากได้แบบนี้บ้าง <i data-lucide="arrow-up-right" class="h-4 w-4"></i>
        </a>
      </div>
      <div class="mt-12 space-y-14">
        ${verticalPortfolio.length ? `
        <div>
          <h3 class="flex items-center gap-2 text-sm font-semibold uppercase tracking-widest text-muted-foreground mb-5">
            <i data-lucide="smartphone" class="h-4 w-4"></i> แนวตั้ง 9:16 · TikTok / Reels / Shorts
          </h3>
          <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4">${verticalPortfolioHtml}</div>
        </div>` : ''}
        ${horizontalPortfolio.length ? `
        <div>
          <h3 class="flex items-center gap-2 text-sm font-semibold uppercase tracking-widest text-muted-foreground mb-5">
            <i data-lucide="monitor-play" class="h-4 w-4"></i> แนวนอน 16:9 · YouTube / Facebook / Brand Film
          </h3>
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">${horizontalPortfolioHtml}</div>
        </div>` : ''}
      </div>
    </section>` : ''}

    <!-- Experience -->
    ${isSectionOn('experience') ? `
    <section id="experience" class="mx-auto max-w-[80rem] px-5 py-24">
      <div class="max-w-2xl">
        <p class="text-sm font-semibold uppercase tracking-widest text-accent">ประสบการณ์ทำงาน</p>
        <h2 class="mt-3 font-display text-4xl sm:text-5xl font-bold tracking-tight">${esc(c.experience.title)}</h2>
      </div>
      <div class="relative mt-12">
        <div id="exp-track" class="flex gap-5 overflow-x-auto snap-x snap-mandatory scroll-smooth pb-2 -mx-1 px-1 ${expCarouselDesktop ? '' : 'sm:grid sm:grid-cols-3 sm:overflow-visible sm:snap-none sm:gap-6 sm:pb-0 sm:px-0 sm:mx-0'}">${experienceHtml}</div>
        ${expShowNav ? `
        <button type="button" id="exp-prev" class="icon-btn absolute left-0 top-1/2 -translate-y-1/2 -translate-x-1/2 z-10 grid place-items-center h-10 w-10 rounded-full border border-border bg-card/90 backdrop-blur shadow-lg ${expCarouselDesktop ? '' : 'sm:hidden'}" aria-label="ก่อนหน้า">
          <i data-lucide="chevron-left" class="h-5 w-5"></i>
        </button>
        <button type="button" id="exp-next" class="icon-btn absolute right-0 top-1/2 -translate-y-1/2 translate-x-1/2 z-10 grid place-items-center h-10 w-10 rounded-full border border-border bg-card/90 backdrop-blur shadow-lg ${expCarouselDesktop ? '' : 'sm:hidden'}" aria-label="ถัดไป">
          <i data-lucide="chevron-right" class="h-5 w-5"></i>
        </button>` : ''}
      </div>
    </section>` : ''}

    <!-- Skills -->
    ${isSectionOn('skills') ? `
    <section id="skills" class="mx-auto max-w-[80rem] px-5 py-24">
      <div class="max-w-2xl">
        <p class="text-sm font-semibold uppercase tracking-widest text-accent">ทักษะ/ความสามารถ</p>
        <h2 class="mt-3 font-display text-4xl sm:text-5xl font-bold tracking-tight">${esc(c.skills.title)}</h2>
      </div>
      <div class="mt-12 grid gap-5 grid-cols-2 lg:grid-cols-4">${skillsHtml}</div>
    </section>` : ''}

    <!-- Process -->
    ${isSectionOn('process') ? `
    <section id="process" class="border-y border-border bg-card/40">
      <div class="mx-auto max-w-[80rem] px-5 py-24">
        <div class="max-w-2xl">
          <p class="text-sm font-semibold uppercase tracking-widest text-accent">ขั้นตอนการทำงาน</p>
          <h2 class="mt-3 font-display text-4xl sm:text-5xl font-bold tracking-tight">ง่าย โปร่งใส ทุกขั้นตอน</h2>
        </div>
        <div class="mt-14 grid gap-6 sm:grid-cols-2 lg:grid-cols-4">${stepsHtml}</div>
      </div>
    </section>` : ''}

    <!-- Contact -->
    ${isSectionOn('contact') ? `
    <section id="contact" class="mx-auto max-w-[80rem] px-5 py-24">
      <div class="grid gap-12 lg:grid-cols-2 lg:items-start">
        <div>
          <p class="text-sm font-semibold uppercase tracking-widest text-accent">ติดต่อสั่งงาน</p>
          <h2 class="mt-3 font-display text-4xl sm:text-5xl font-bold tracking-tight leading-tight">
            พร้อมทำให้คอนเทนต์<br>ของคุณ<span class="text-gradient">ปังกว่าเดิม</span>
          </h2>
          <p class="mt-5 text-muted-foreground text-lg leading-relaxed">บอกเราสั้น ๆ ว่าอยากได้งานแบบไหน แล้วเราจะติดต่อกลับพร้อมใบเสนอราคาภายใน 24 ชั่วโมง</p>
          <div class="mt-8 space-y-4">${contactItemsHtml}</div>
          <div class="mt-8 flex gap-3">${socialsHtml}</div>
          <ul class="mt-8 space-y-2">${bulletsHtml}</ul>
        </div>

        <form id="contact-form" class="glass-card rounded-2xl p-7 sm:p-9">
          <div class="grid gap-5">
            <div class="grid gap-2">
              <label class="text-sm font-medium" for="name">ชื่อ / แบรนด์</label>
              <input id="name" name="name" class="rounded-xl border border-input bg-background px-4 py-3 outline-none focus:border-primary focus:ring-2 focus:ring-primary/30 transition" placeholder="เช่น คาเฟ่ริมคลอง">
            </div>
            <div class="grid gap-2">
              <label class="text-sm font-medium" for="contact-value">ช่องทางติดต่อกลับ (โทร / LINE / อีเมล)</label>
              <input id="contact-value" name="contact" class="rounded-xl border border-input bg-background px-4 py-3 outline-none focus:border-primary focus:ring-2 focus:ring-primary/30 transition" placeholder="08x-xxx-xxxx">
            </div>
            <div class="grid gap-2">
              <label class="text-sm font-medium" for="platform">แพลตฟอร์มหลัก</label>
              <select id="platform" name="platform" class="rounded-xl border border-input bg-background px-4 py-3 outline-none focus:border-primary focus:ring-2 focus:ring-primary/30 transition">${platformOptions}</select>
            </div>
            <div class="grid gap-2">
              <label class="text-sm font-medium" for="detail">รายละเอียดงาน</label>
              <textarea id="detail" name="detail" rows="4" class="rounded-xl border border-input bg-background px-4 py-3 outline-none focus:border-primary focus:ring-2 focus:ring-primary/30 transition resize-none" placeholder="เล่าคร่าว ๆ ว่าอยากได้งานแบบไหน ความยาว จำนวนคลิป ฯลฯ"></textarea>
            </div>
            <button type="submit" class="mt-1 inline-flex items-center justify-center gap-2 rounded-xl bg-primary px-6 py-3.5 font-semibold text-primary-foreground shadow-lg shadow-primary/25 hover:opacity-90 active:scale-[0.98] transition">
              ส่งคำขอสั่งงาน <i data-lucide="arrow-up-right" class="h-4 w-4"></i>
            </button>
          </div>
        </form>
      </div>
    </section>` : ''}

    <!-- Footer -->
    <footer class="border-t border-border">
      <div class="mx-auto max-w-[80rem] px-5 py-10 flex flex-col sm:flex-row items-center justify-between gap-4">
        <div class="flex items-center gap-2 font-display font-bold">
          <span class="grid place-items-center h-7 w-7 rounded-lg bg-gradient-to-br from-primary to-accent text-white">
            <i data-lucide="clapperboard" class="h-3.5 w-3.5" stroke-width="2.5"></i>
          </span>
          ${esc(c.brand.name)} ${esc(c.brand.accent)}
        </div>
        <p class="text-sm text-muted-foreground">© ${year} ${esc(c.footer.text)}</p>
      </div>
    </footer>
  `;

  // Icons
  if (window.lucide) lucide.createIcons();

  // Offset hero content by the actual height of the fixed banner+header (varies with banner text/size)
  updateFixedOffset();
  window.removeEventListener('resize', updateFixedOffset);
  window.addEventListener('resize', updateFixedOffset);

  // Scroll reveal
  const revealEls = document.querySelectorAll('.reveal');
  if (window.IntersectionObserver) {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('in-view');
          io.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1, rootMargin: '-40px' });
    revealEls.forEach((el, i) => {
      el.style.transitionDelay = `${Math.min(i % 6, 6) * 60}ms`;
      io.observe(el);
    });
  } else {
    revealEls.forEach(el => el.classList.add('in-view'));
  }

  // Experience carousel — prev/next buttons scroll the track by one card width
  const expTrack = document.getElementById('exp-track');
  const expPrev = document.getElementById('exp-prev');
  const expNext = document.getElementById('exp-next');
  if (expTrack && (expPrev || expNext)) {
    const scrollByCard = (dir) => {
      const card = expTrack.querySelector(':scope > *');
      const amount = card ? card.getBoundingClientRect().width + 20 : expTrack.clientWidth;
      expTrack.scrollBy({ left: dir * amount, behavior: 'smooth' });
    };
    if (expPrev) expPrev.addEventListener('click', () => scrollByCard(-1));
    if (expNext) expNext.addEventListener('click', () => scrollByCard(1));
  }

  // Nav menu indicators — shared "move to element" helper for both hover-glide and the active pill
  const navEl = document.getElementById('main-nav');
  const navHoverBg = document.getElementById('nav-hover-bg');
  const navActiveBg = document.getElementById('nav-active-bg');
  function moveNavIndicatorTo(indicator, el) {
    if (!navEl || !indicator || !el) return;
    const navRect = navEl.getBoundingClientRect();
    const elRect = el.getBoundingClientRect();
    indicator.style.width = `${elRect.width}px`;
    indicator.style.height = `${elRect.height}px`;
    indicator.style.transform = `translate(${elRect.left - navRect.left}px, ${elRect.top - navRect.top}px)`;
    indicator.style.opacity = '1';
  }
  if (navEl && navHoverBg) {
    navEl.querySelectorAll('.nav-link').forEach(link => {
      link.addEventListener('mouseenter', () => moveNavIndicatorTo(navHoverBg, link));
    });
    navEl.addEventListener('mouseleave', () => { navHoverBg.style.opacity = '0'; });
  }
  window.addEventListener('resize', () => {
    const activeLink = navEl && navEl.querySelector('.nav-link.active');
    if (activeLink) moveNavIndicatorTo(navActiveBg, activeLink);
  });

  // Scrollspy — highlight nav link for the section in view + glide the active pill to it
  const navLinks = document.querySelectorAll('.nav-link');
  if (window.IntersectionObserver && navLinks.length) {
    const spySections = [...navLinks]
      .map(a => document.querySelector(a.getAttribute('href')))
      .filter(Boolean);
    const spy = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        const href = '#' + entry.target.id;
        navLinks.forEach(l => l.classList.toggle('active', l.getAttribute('href') === href));
        const activeLink = navEl && navEl.querySelector('.nav-link.active');
        if (activeLink) moveNavIndicatorTo(navActiveBg, activeLink);
      });
    }, { rootMargin: '-45% 0px -50% 0px', threshold: 0 });
    spySections.forEach(s => spy.observe(s));
  }

  // Toast helper
  function showToast(title, desc, variant) {
    const toast = document.getElementById('toast');
    document.getElementById('toast-title').textContent = title;
    document.getElementById('toast-desc').textContent = desc;
    toast.className = `fixed bottom-5 right-5 z-[100] max-w-sm rounded-xl border p-4 shadow-2xl transition-all duration-300 ${variant === 'destructive' ? 'bg-destructive/10 border-destructive text-destructive-foreground' : 'bg-card border-border'}`;
    requestAnimationFrame(() => {
      toast.classList.remove('translate-y-4', 'opacity-0', 'pointer-events-none');
    });
    clearTimeout(window.__toastTimer);
    window.__toastTimer = setTimeout(() => {
      toast.classList.add('translate-y-4', 'opacity-0', 'pointer-events-none');
    }, 4000);
  }

  // Contact form
  const form = document.getElementById('contact-form');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = new FormData(form);
    const name = data.get('name')?.trim();
    const contact = data.get('contact')?.trim();
    const platform = data.get('platform');
    const detail = data.get('detail')?.trim();
    if (!name || !contact) {
      showToast('กรอกข้อมูลไม่ครบ', 'กรุณาระบุชื่อและช่องทางติดต่อกลับ', 'destructive');
      return;
    }

    const web3formsKey = c.contact.web3formsKey;
    const submitBtn = form.querySelector('button[type="submit"]');

    if (web3formsKey) {
      data.append('access_key', web3formsKey);
      data.append('subject', `สอบถามงานตัดต่อวิดีโอ จาก ${name}`);
      data.append('from_name', name);
      const originalBtnHtml = submitBtn.innerHTML;
      submitBtn.disabled = true;
      submitBtn.innerHTML = 'กำลังส่ง...';
      try {
        const res = await fetch('https://api.web3forms.com/submit', {
          method: 'POST',
          headers: { Accept: 'application/json' },
          body: data,
        });
        const result = await res.json();
        if (result.success) {
          showToast('ส่งคำขอเรียบร้อย', 'เราจะติดต่อกลับโดยเร็วที่สุด');
          form.reset();
        } else {
          throw new Error(result.message || 'ส่งไม่สำเร็จ');
        }
      } catch (err) {
        showToast('ส่งไม่สำเร็จ', 'ลองใหม่อีกครั้ง หรือติดต่อทางช่องทางอื่นด้านล่างนี้', 'destructive');
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalBtnHtml;
        if (window.lucide) lucide.createIcons();
      }
    } else {
      const body = encodeURIComponent(`ชื่อ: ${name}\nช่องทางติดต่อ: ${contact}\nแพลตฟอร์ม: ${platform}\nรายละเอียดงาน: ${detail}`);
      window.location.href = `mailto:${c.contact.email}?subject=${encodeURIComponent('สอบถามงานตัดต่อวิดีโอ')}&body=${body}`;
      showToast('ส่งคำขอเรียบร้อย', 'เรากำลังเปิดอีเมลของคุณ จะติดต่อกลับโดยเร็วที่สุด');
      form.reset();
    }
  });
}

render(CONTENT);

// Live-update if admin edits in another tab of the same browser
window.addEventListener('storage', (e) => {
  if (e.key === STORAGE_KEY) {
    const updated = loadContent();
    applyTheme(updated.theme || 'green');
    render(updated);
  }
});
</script>
</body>
</html>
